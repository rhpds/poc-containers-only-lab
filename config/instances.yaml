---
# Container Conversion: zt-using-file-permissions
# Converted from VM-based lab to container-based lab
# Image: rhel-lab-tools:v1.1.0-file-permissions (base tools + lab setup pre-configured)

virtualmachines: []  # Empty - no VMs

containers:
  - name: rhel
    image: quay.io/rhn_support_wharris/rhel-lab-tools:v1.1.0-file-permissions
    command: ['sleep', 'infinity']
    cpu: "1"
    memory: "1Gi"
    environment: {}
    ports:
      - name: http
        containerPort: 8080
        protocol: TCP
    terminals:
      - name: shell
        command: oc exec -it rhel -- /bin/bash
