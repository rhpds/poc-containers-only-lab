---
# Container Conversion: zt-using-file-permissions
# Converted from VM-based lab to container-based lab
# Image: rhel-lab-tools:v1.1.0 (includes coreutils, findutils, shadow-utils)

virtualmachines: []  # Empty - no VMs

containers:
  - name: rhel
    image: quay.io/rhn_support_wharris/rhel-lab-tools:v1.1.0
    command: ['sleep', 'infinity']
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "1Gi"
    ports:
      - name: http
        containerPort: 8080
        protocol: TCP
    terminals:
      - name: shell
        command: oc exec -it rhel -- /bin/bash
