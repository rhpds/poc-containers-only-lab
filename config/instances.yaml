---
# Proof of Concept: Container-Only Lab (No VMs)
# Tests if Showroom can deploy with containers instead of KubeVirt VMs

virtualmachines: []  # Empty - no VMs

containers:
  - name: rhel-shell
    image: registry.redhat.io/ubi9/ubi:latest
    command: ['sleep', 'infinity']
    memory: 2Gi
    ports:
      - name: http
        containerPort: 8080
        protocol: TCP
    environment:
      LAB_USER: rhel
    terminals:
      - name: shell
        command: oc exec -it rhel-shell -- /bin/bash
    commands:
      # Verification commands (non-root)
      - echo "Container started successfully"
      - cat /etc/redhat-release
      - id
      - echo "PoC container ready for terminal access"
