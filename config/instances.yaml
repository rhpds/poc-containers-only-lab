---
# Proof of Concept: Container-Only Lab (No VMs)
# Tests if Showroom can deploy with containers instead of KubeVirt VMs

virtualmachines: []  # Empty - no VMs

containers:
  - name: rhel-shell
    image: registry.redhat.io/ubi9/ubi:latest
    resources:
      limits:
        cpu: 1000m
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 1Gi
    env:
      - name: LAB_USER
        value: rhel
    commands:
      # Install common RHEL tools
      - |
        dnf install -y \
          vim-enhanced \
          tmux \
          git \
          python3 \
          python3-pip \
          bash-completion \
          && dnf clean all
      # Create lab user
      - |
        useradd -m -s /bin/bash rhel
        echo "rhel ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers
        echo "Container ready: RHEL $(cat /etc/redhat-release)"
    terminals:
      - name: shell
        command: /bin/bash
    routes:
      - name: container-test
        host: container-test
        targetPort: 8080
        tls: true
        tls_termination: edge
