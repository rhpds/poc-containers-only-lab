---
# Proof of Concept: Container-Only Lab (No VMs)
# Tests if Showroom can deploy with containers instead of KubeVirt VMs

virtualmachines: []  # Empty - no VMs

containers:
  - name: rhel-shell
    image: registry.redhat.io/ubi9/ubi:latest
    command: ['sleep', 'infinity']
    memory: 2Gi
    ports:
      - name: http
        containerPort: 8080
        protocol: TCP
    environment:
      LAB_USER: rhel
    terminals:
      - name: shell
        command: /bin/bash
    commands:
      # Install common RHEL tools
      - |
        dnf install -y \
          vim-enhanced \
          tmux \
          git \
          python3 \
          python3-pip \
          bash-completion \
          && dnf clean all
      # Create lab user
      - |
        useradd -m -s /bin/bash rhel
        echo "rhel ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers
        echo "Container ready: RHEL $(cat /etc/redhat-release)"
